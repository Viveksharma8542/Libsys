version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgre@sql
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: development
      PORT: 5003
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: lms_db
      DB_USER: postgres
      DB_PASSWORD: Postgre@sql
      JWT_SECRET: V9k@7Lm$2Qx!pR8#sT4uWzY6&N3bF1hJ
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: R5t!Y8uI2oP#lK9mN4bV6cX@zA1sD3fG
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      BCRYPT_ROUNDS: 10
    ports:
      - "5003:5003"

volumes:
  pgdata:
